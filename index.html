    body {

      color: #d4d4d4;
    }

    }

    function renderCharacterCard(char) {
      return `
        <div onclick="openModal(${char.id})" class="group cursor-pointer bg-noir-card border border-noir-border hover:border-noir-muted transition-colors duration-500 flex flex-col">
          <div class="w-full aspect-square overflow-hidden border-b border-noir-border bg-black">
            <img src="${char.listImage}" alt="${char.name}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" />
          </div>
          <div class="p-4 flex items-center justify-center text-center">
            <h3 class="text-lg font-serif text-white tracking-wider">${char.name}</h3>
          </div>
        </div>
      `;
    }

          <div class="flex items-center gap-4 mb-8">
            <h2 class="text-2xl font-serif text-white tracking-widest uppercase">오페라 하우스</h2>
            <div class="h-px bg-noir-border flex-1"></div>
          </div>
          <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-6">
            ${operaHouse.map(renderCharacterCard).join('')}
          </div>
        </section>

        <section>
          <div class="flex items-center gap-4 mb-8">
            <h2 class="text-2xl font-serif text-white tracking-widest uppercase">카덴차</h2>
            <div class="h-px bg-noir-border flex-1"></div>
          </div>
          <div class="flex justify-center">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-6 w-full max-w-[1050px]">

    function openModal(id, pushHistory = true) {

      const container = document.getElementById('modal-container');
      container.innerHTML = `
        <div class="w-full min-h-screen flex flex-col md:flex-row animate-fade-in">
          <!-- Left: Image (Sticky on Desktop) -->
          <div class="w-full md:w-2/5 lg:w-1/2 shrink-0 border-b md:border-b-0 md:border-r border-noir-border bg-black md:sticky md:top-0 md:h-screen">
            <img src="${char.profileImage}" alt="${char.name}" class="w-full h-full object-cover" />
          </div>
          
          <!-- Right: Content (Scrollable) -->
          <div class="p-8 md:p-16 lg:p-24 flex-1 flex flex-col relative">
            <!-- Close Button -->
            <button onclick="closeModalWithHistory()" class="fixed top-6 right-6 md:top-10 md:right-10 z-50 bg-noir-card/80 backdrop-blur border border-noir-border p-3 rounded-full text-noir-muted hover:text-white hover:bg-noir-border transition-all cursor-pointer shadow-xl">
              <i data-lucide="x" class="w-6 h-6"></i>

            <div class="mb-12 mt-4 md:mt-0 pr-12">

            </div>
            
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-8 mb-16 border-y border-noir-border py-10">

              </div>
              <div>
                <p class="text-noir-muted text-xs uppercase tracking-[0.15em] mb-3 font-serif">Age</p>
                <p class="font-sans text-xl text-white font-light">${char.age}</p>
              </div>
              <div>
                <p class="text-noir-muted text-xs uppercase tracking-[0.15em] mb-3 font-serif">Role</p>
                <p class="font-sans text-xl text-white font-light">${char.role}</p>

            <div class="space-y-12 max-w-3xl">

                <p class="font-sans text-lg leading-relaxed font-light text-noir-text whitespace-pre-line">${char.appearance}</p>
              </section>
              <section>

              </section>
              <section>
                <h3 class="text-noir-muted text-sm uppercase tracking-[0.2em] mb-4 border-b border-noir-border pb-3 font-serif">Features</h3>
                <p class="font-sans text-lg leading-relaxed font-light text-noir-text whitespace-pre-line">${char.features}</p>
              </section>
            </div>
          </div>
        </div>
      `;
      container.classList.remove('hidden');
      document.body.style.overflow = 'hidden';
      lucide.createIcons();
    }

    function closeModal() {
      const container = document.getElementById('modal-container');
      container.classList.add('hidden');
      container.innerHTML = '';
      document.body.style.overflow = 'unset';
    }

    function closeModalWithHistory() {
      closeModal();
      // Go back in history to remove the hash and trigger popstate, 
      // or if there's no history, just replace state
      if (history.state && history.state.modalOpen) {
        history.back();
      } else {
        history.pushState('', document.title, window.location.pathname + window.location.search);
      }
    }

    // Handle browser back/forward buttons
    window.addEventListener('popstate', (event) => {
      if (window.location.hash.startsWith('#character-')) {
        const id = parseInt(window.location.hash.replace('#character-', ''));
        if (!isNaN(id)) {
          openModal(id, false); // false = don't push state again
        }
      } else {
        closeModal();
      }
    });

    // Handle initial load with hash
    window.addEventListener('load', () => {
      if (window.location.hash.startsWith('#character-')) {
        const id = parseInt(window.location.hash.replace('#character-', ''));
        if (!isNaN(id)) {
          openModal(id, false); // Replace state instead of pushing
          history.replaceState({ modalOpen: true, id: id }, '', `#character-${id}`);
        }
      }
    });

    // Initialize
    renderMain();
  </script>
</body>
</html>
